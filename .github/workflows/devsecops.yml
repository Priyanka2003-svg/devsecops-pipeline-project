name: DevSecOps Pipeline

# ✅ Explicit permissions for Checkov CKV2_GHA_1
# ✅ Explicit permissions to satisfy Checkov CKV2_GHA_1
permissions:
  contents: read          # access to repo code
  actions: read           # read access to GitHub Actions
  checks: write           # to post status checks
  pull-requests: write    # for PR updates


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout the repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Set up Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # 3️⃣ Build with Maven
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4️⃣ OWASP Dependency Check
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
          -Dformat=HTML \
          -DautoUpdate=false \
          -DfailOnError=false

      # 5️⃣ Upload OWASP report
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target

      # 6️⃣ SonarCloud Scan
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
          -Dsonar.organization=${{ secrets.SONAR_ORG }} \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 7️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t secure-app:latest .

      # 8️⃣ Trivy Docker Scan using official Action
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.13.1
        with:
          image-ref: secure-app:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      # 🔟 Checkov IaC scan (Terraform or other configs)
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
