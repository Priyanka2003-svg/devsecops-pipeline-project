name: DevSecOps Pipeline

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Set up Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 3️⃣ Build Maven
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4️⃣ OWASP Dependency Check
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Dformat=HTML \
            -DautoUpdate=false \
            -DfailOnError=false

      # 5️⃣ Upload OWASP report (directory)
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report  # <- directory instead of file

      # 6️⃣ SonarCloud Scan
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 7️⃣ Build Docker image
      - name: Build Docker Image
        run: docker build -t secure-app:latest .

      # 8️⃣ Scan Docker image with Trivy (stable latest)
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0  # ✔ Use latest stable version
        with:
          image-ref: secure-app:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      # 9️⃣ Checkov IaC Scan
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
